<svg width="960" height="720" viewBox="0 0 960 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="960" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F2F7FF" />
      <stop offset="1" stop-color="#E9EEF6" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0B3A82" />
      <stop offset="1" stop-color="#1677FF" />
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14" />
    </filter>
  </defs>

  <rect x="0" y="0" width="960" height="720" rx="28" fill="url(#bg)" />

  <!-- Accent blobs -->
  <circle cx="170" cy="130" r="110" fill="#1677FF" opacity="0.10" filter="url(#soft)" />
  <circle cx="820" cy="560" r="140" fill="#0B3A82" opacity="0.10" filter="url(#soft)" />

  <!-- Ground -->
  <path d="M60 600C180 560 260 560 360 585C520 625 690 640 900 590V720H60V600Z" fill="#DDE6F2" />

  <!-- Main building -->
  <rect x="260" y="250" width="440" height="330" rx="14" fill="#FFFFFF" stroke="#D7DEE9" />
  <rect x="300" y="290" width="360" height="36" rx="8" fill="#F2F6FC" />
  <rect x="460" y="220" width="40" height="70" rx="10" fill="url(#accent)" />

  <!-- Windows -->
  <g opacity="0.95">
    <rect x="300" y="350" width="70" height="46" rx="8" fill="#F2F6FC" stroke="#E1E7F0" />
    <rect x="390" y="350" width="70" height="46" rx="8" fill="#F2F6FC" stroke="#E1E7F0" />
    <rect x="480" y="350" width="70" height="46" rx="8" fill="#F2F6FC" stroke="#E1E7F0" />
    <rect x="570" y="350" width="70" height="46" rx="8" fill="#F2F6FC" stroke="#E1E7F0" />

    <rect x="300" y="414" width="70" height="46" rx="8" fill="#F2F6FC" stroke="#E1E7F0" />
    <rect x="390" y="414" width="70" height="46" rx="8" fill="#F2F6FC" stroke="#E1E7F0" />
    <rect x="480" y="414" width="70" height="46" rx="8" fill="#F2F6FC" stroke="#E1E7F0" />
    <rect x="570" y="414" width="70" height="46" rx="8" fill="#F2F6FC" stroke="#E1E7F0" />

    <rect x="300" y="478" width="70" height="46" rx="8" fill="#F2F6FC" stroke="#E1E7F0" />
    <rect x="390" y="478" width="70" height="46" rx="8" fill="#F2F6FC" stroke="#E1E7F0" />
    <rect x="480" y="478" width="70" height="46" rx="8" fill="#F2F6FC" stroke="#E1E7F0" />
    <rect x="570" y="478" width="70" height="46" rx="8" fill="#F2F6FC" stroke="#E1E7F0" />
  </g>

  <!-- Door -->
  <rect x="450" y="520" width="60" height="60" rx="10" fill="#0B3A82" opacity="0.90" />

  <!-- Flag -->
  <path d="M510 220C540 232 560 226 585 214C595 210 604 210 612 214V258C590 246 572 252 545 262C533 266 521 265 510 262V220Z" fill="#1677FF" opacity="0.75" />
</svg>

